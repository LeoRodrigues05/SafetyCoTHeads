# Tracker Exp 7: BeaverTails end-to-end pipeline
# Step 1: SHIPS discovery on BeaverTails (uniform sample across 14 categories).
tracker:
  experiment: 7
  run: ships_discovery_beavertails
  status: runnable
seed: 0
method: ships
model:
  name: meta-llama/Llama-2-7b-chat-hf
  dtype: bfloat16
  attn_implementation: eager
dataset:
  name: beavertails
  # 10 prompts per category x 14 categories = 140 prompts.
  n_per_category: 10
method_args:
  mask_qkv: [q]
  mask_type: scale_mask
  scale_factor: 1.0e-4
  top_k: 10
  prompt_template: "## Query:{q}\n## Answer:"
output:
  dir: runs/07-ships-beavertails
  top_k: 16
