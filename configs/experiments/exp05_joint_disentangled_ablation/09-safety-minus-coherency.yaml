# Tracker Exp 5: Joint / Disentangled Ablation
# Run: ablate safety heads minus overlap with coherency heads.
# The "explicit" head source lets you write the heads inline after running the
# overlap analysis in scripts/run_analysis.py.
tracker:
  experiment: 5
  run: safety_excluding_coherency_overlap
  status: requires_overlap_heads
seed: 0
condition: safety_excluding_coherency_overlap
model:
  name: meta-llama/Llama-2-7b-chat-hf
  dtype: bfloat16
  attn_implementation: eager
dataset:
  name: jailbreakbench
  n: 100
heads:
  source: explicit
  heads:                           # filled in after overlap analysis
    - {layer: 10, head: 0}
mask:
  mask_qkv: [q]
  mask_type: scale_mask
  scale_factor: 1.0e-4
decoding:
  max_new_tokens: 256
  temperature: 0.0
  do_sample: false
  seed: 0
batch_size: 4
output:
  dir: runs/09-safety-minus-coherency
