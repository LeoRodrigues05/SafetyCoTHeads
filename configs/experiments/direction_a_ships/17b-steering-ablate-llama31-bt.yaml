# Direction A v4 — directional ablation steering, Llama-3.1-8B on FULL BeaverTails.
# Same default as 17a (Arditi et al. 2024).
tracker:
  experiment: direction_a
  run: steering_ablate_llama31_bt
  status: runnable
seed: 0
condition: steering_ablate
model:
  name: meta-llama/Llama-3.1-8B-Instruct
  dtype: bfloat16
  attn_implementation: eager
dataset:
  name: beavertails
  categories: null
  n_per_category: null
steering:
  direction_path: runs/direction_a/17-direction-extraction-llama31/refusal_directions.npz
  layer: 14
  mode: ablate
  alpha: 1.0
decoding:
  max_new_tokens: 512
  temperature: 0.0
  do_sample: false
  seed: 0
batch_size: 4
output:
  dir: runs/direction_a/17-steering-ablate-llama31-bt/seed0
