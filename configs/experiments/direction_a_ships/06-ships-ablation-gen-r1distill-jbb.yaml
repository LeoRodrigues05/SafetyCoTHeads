# Direction A — SHIPS top-10 ablation generation, DeepSeek-R1-Distill on JailbreakBench.
tracker:
  experiment: direction_a
  run: ships_ablation_r1distill_jbb
  status: runnable
seed: 0
condition: ships_top10
model:
  name: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
  dtype: bfloat16
  attn_implementation: eager
dataset:
  name: jailbreakbench
  n: 100
heads:
  source: file
  path: runs/direction_a/02-ships-discovery-r1distill/ships_dataset_ranking.json
  top_k: 10
mask:
  mask_qkv: [q]
  mask_type: scale_mask
  scale_factor: 1.0e-4
decoding:
  max_new_tokens: 1024
  temperature: 0.0
  do_sample: false
  seed: 0
batch_size: 2
output:
  dir: runs/direction_a/06-ships-ablation-r1distill-jbb/seed0
