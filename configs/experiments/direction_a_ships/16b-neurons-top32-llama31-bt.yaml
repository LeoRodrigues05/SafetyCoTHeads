# Direction A v4 — neuron ablation, Llama-3.1-8B-Instruct on FULL BeaverTails.
# Same default as 16a (Wang et al. 2024, top-32, scale=0.0).
tracker:
  experiment: direction_a
  run: neuron_top32_llama31_bt
  status: runnable
seed: 0
condition: neurons_top32
model:
  name: meta-llama/Llama-3.1-8B-Instruct
  dtype: bfloat16
  attn_implementation: eager
dataset:
  name: beavertails
  categories: null
  n_per_category: null
neurons:
  source: file
  path: runs/direction_a/16-neuron-discovery-llama31/neuron_ranking.json
  top_k: 32
  mask_type: scale_mask
  scale_factor: 0.0
decoding:
  max_new_tokens: 512
  temperature: 0.0
  do_sample: false
  seed: 0
batch_size: 4
output:
  dir: runs/direction_a/16-neurons-top32-llama31-bt/seed0
