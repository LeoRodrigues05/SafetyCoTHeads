# Direction A — SHIPS head discovery on DeepSeek-R1-Distill-Llama-8B.
# Same SHIPS template / mask configuration as Llama-3.1.
tracker:
  experiment: direction_a
  run: ships_discovery_r1distill
  status: runnable
seed: 0
method: ships
model:
  name: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
  dtype: bfloat16
  attn_implementation: eager
dataset:
  name: maliciousinstruct
  n: 100   # full available split
method_args:
  mask_qkv: [q]
  mask_type: scale_mask
  scale_factor: 1.0e-4
  top_k: 10
  prompt_template: "## Query:{q}\n## Answer:"
output:
  dir: runs/direction_a/02-ships-discovery-r1distill
  top_k: 16
