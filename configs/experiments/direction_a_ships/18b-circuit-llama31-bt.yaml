# Direction A v4 — circuit ablation on FULL BeaverTails. Same defaults as 18a.
tracker:
  experiment: direction_a
  run: circuit_llama31_bt
  status: runnable
seed: 0
condition: circuit_top8_top32_ablate
model:
  name: meta-llama/Llama-3.1-8B-Instruct
  dtype: bfloat16
  attn_implementation: eager
dataset:
  name: beavertails
  categories: null
  n_per_category: null
circuit:
  heads_path: runs/direction_a/01-ships-discovery-llama31/ships_dataset_ranking.json
  top_heads: 8
  mask_qkv: [q]
  head_mask_type: scale_mask
  head_scale_factor: 1.0e-4
  neurons_path: runs/direction_a/16-neuron-discovery-llama31/neuron_ranking.json
  top_neurons: 32
  neuron_scale_factor: 0.0
  direction_path: runs/direction_a/17-direction-extraction-llama31/refusal_directions.npz
  direction_layer: 14
  steering_mode: ablate
decoding:
  max_new_tokens: 512
  temperature: 0.0
  do_sample: false
  seed: 0
batch_size: 4
output:
  dir: runs/direction_a/18-circuit-llama31-bt/seed0
