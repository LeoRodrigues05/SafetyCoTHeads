# Direction A v4 — final-answer safety judge (Qwen2.5-32B-Instruct NF4, 5-label).
# Used by `scripts/run_judge.py` over a full `completions_*.jsonl`.
# Pairs with configs 15a-e to produce `judged_<condition>.jsonl` whose
# `judge_flat.labels.harmful_response` provides the binary ASR signal.
tracker:
  experiment: direction_a
  run: final_safety_judge_v4
  status: runnable
model:
  name: Qwen/Qwen2.5-32B-Instruct
  dtype: bfloat16
  load_in_4bit: true
  device_map: auto
kind: safety
max_new_tokens: 128
base_temperature: 0.0
retry_temperature: 0.3
max_retries: 2
batch_size: 8
use_chat_template: true
seed: 0
n_limit: null
