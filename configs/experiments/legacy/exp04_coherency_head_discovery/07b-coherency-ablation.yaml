# Tracker Exp 4: Coherency-Head Discovery
# Run: ablate top-K coherency heads on JailbreakBench.
tracker:
  experiment: 4
  run: coherency_head_ablation
  status: blocked_until_discovery_wired
seed: 0
condition: coherency_head_ablation
model:
  name: meta-llama/Llama-2-7b-chat-hf
  dtype: bfloat16
  attn_implementation: eager
dataset:
  name: jailbreakbench
  n: 100
heads:
  source: file
  path: runs/07-coherency-discovery/coherency_dataset_ranking.json
  top_k: 10
mask:
  mask_qkv: [q]
  mask_type: scale_mask
  scale_factor: 1.0e-4
decoding:
  max_new_tokens: 256
  temperature: 0.0
  do_sample: false
  seed: 0
batch_size: 4
output:
  dir: runs/07b-coherency-ablation
