# Tracker Exp 1: Reproduce SHIPS + Sahara
# Run: SHIPS discovery on MaliciousInstruct.
tracker:
  experiment: 1
  run: ships_discovery
  status: runnable
seed: 0
method: ships
model:
  name: meta-llama/Llama-2-7b-chat-hf
  dtype: bfloat16
  attn_implementation: eager
dataset:
  name: maliciousinstruct
  n: 100
method_args:
  mask_qkv: [q]
  mask_type: scale_mask
  scale_factor: 1.0e-4
  top_k: 10
  prompt_template: "## Query:{q}\n## Answer:"
output:
  dir: runs/01-ships-discovery
  top_k: 16
