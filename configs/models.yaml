  name: meta-llama/Llama-2-7b-chat-hf
  dtype: bfloat16
  attn_implementation: eager
  load_in_4bit: false
  device_map: null
  trust_remote_code: false

mistral_7b_instruct:
  name: mistralai/Mistral-7B-Instruct-v0.2
  dtype: bfloat16
  attn_implementation: eager
  load_in_4bit: false
  device_map: null
  trust_remote_code: false

# Direction A primary instruction-tuned model.
llama31_8b_instruct:
  name: meta-llama/Llama-3.1-8B-Instruct
  dtype: bfloat16
  attn_implementation: eager
  load_in_4bit: false
  device_map: null
  trust_remote_code: false

# Direction A reasoning model. Uses <think>...</think> blocks; tokenizer ships
# with a chat template that emits the think tags automatically.
deepseek_r1_distill_llama_8b:
  name: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
  dtype: bfloat16
  attn_implementation: eager
  load_in_4bit: false
  device_map: null
  trust_remote_code: false

# DeepSeek-R1-Distill-Qwen-7B — R1 long-CoT reasoning distilled onto a
# Qwen2.5-Math-7B backbone. Emits <think>...</think> by default. Open (ungated).
# Adds the R1 reasoning lineage to the grid at the matched ~7B scale. ~15 GB BF16.
r1_distill_qwen_7b:
  name: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
  dtype: bfloat16
  attn_implementation: eager
  load_in_4bit: false
  device_map: null
  trust_remote_code: false

# --- Direction A v5 policy models -------------------------------------------
# Qwen3-8B (Apache-2.0) — explicit <think>...</think> blocks via
# `enable_thinking=true` in the chat template. Strongest single small model
# for the v5 pipeline. ~16 GB BF16 on one GPU.
qwen3_8b:
  name: Qwen/Qwen3-8B
  dtype: bfloat16
  attn_implementation: eager
  load_in_4bit: false
  device_map: null
  trust_remote_code: false

# Qwen3-4B-Thinking-2507 — thinking-only variant; cheapest model with
# explicit reasoning traces. ~8 GB BF16.
qwen3_4b_thinking:
  name: Qwen/Qwen3-4B-Thinking-2507
  dtype: bfloat16
  attn_implementation: eager
  load_in_4bit: false
  device_map: null
  trust_remote_code: false

# OLMo-2 7B SFT checkpoint (helpfulness only — pre-safety alignment).
# Used as the "pre-safety-training" arm of the OLMo training-stage contrast.
olmo2_7b_sft:
  name: allenai/OLMo-2-1124-7B-SFT
  dtype: bfloat16
  attn_implementation: eager
  load_in_4bit: false
  device_map: null
  trust_remote_code: false

# OLMo-2 7B Instruct (SFT + DPO + safety alignment). Post-safety arm.
olmo2_7b_instruct:
  name: allenai/OLMo-2-1124-7B-Instruct
  dtype: bfloat16
  attn_implementation: eager
  load_in_4bit: false
  device_map: null
  trust_remote_code: false

# --- OLMo-3 (1125, Nov 2025) — fully-open "model flow" reasoning family -------
# Same dense 7B skeleton as OLMo-2 (32 layers, 4096 hidden, 11008 MLP, 32 heads,
# MHA) so weight footprint / per-token compute are unchanged; OLMo-3 adds a 64k
# context (YaRN ×8) + sliding-window attention (3:1) that is inert at our short
# sequence lengths. Native `olmo3` arch — needs transformers >= 4.57.
#
# OLMo-3 7B Base — pretrained completion model, no chat template (generation
# falls back to the SHIPS query/answer template). Stage-0 / pre-alignment arm.
olmo3_7b_base:
  name: allenai/Olmo-3-1025-7B
  dtype: bfloat16
  attn_implementation: eager
  load_in_4bit: false
  device_map: null
  trust_remote_code: false

# OLMo-3 7B Think — first open reasoning model; emits <think> traces BY DEFAULT
# (no enable_thinking flag). The CoT-bearing arm for the monitorability analysis.
olmo3_7b_think:
  name: allenai/Olmo-3-7B-Think
  dtype: bfloat16
  attn_implementation: eager
  load_in_4bit: false
  device_map: null
  trust_remote_code: false

# Judge — also a chat model, but run in 4-bit by default to save VRAM
judge_llama3_8b:
  name: meta-llama/Meta-Llama-3-8B-Instruct
  dtype: bfloat16
  load_in_4bit: true
  device_map: auto
  trust_remote_code: false

# ~30B-scale judge. Qwen2.5-32B-Instruct in NF4 fits a single 32 GB GPU
# (~17 GB weights + activations) and matches the scale of Granite-4.1-30B used
# by the collaborator's setup. Apache-2.0 licensed.
judge_qwen2_5_32b:
  name: Qwen/Qwen2.5-32B-Instruct
  dtype: bfloat16
  load_in_4bit: true
  device_map: auto
  trust_remote_code: false

# Direction A v4 stronger judge — Qwen3-30B-A3B-Instruct (MoE, 3B active).
# Non-thinking instruct variant; ~17 GB at NF4 (fits single 32 GB GPU).
judge_qwen3_30b_a3b:
  name: Qwen/Qwen3-30B-A3B-Instruct-2507
  dtype: bfloat16
  load_in_4bit: true
  device_map: auto
  trust_remote_code: false
