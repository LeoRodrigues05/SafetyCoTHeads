# Model definitions referenced by experiment configs via ${models.<name>}.
# Override per-host with `--overrides model.name=...`.
llama2_7b_chat:
  name: meta-llama/Llama-2-7b-chat-hf
  dtype: bfloat16
  attn_implementation: eager
  load_in_4bit: false
  device_map: null
  trust_remote_code: false

mistral_7b_instruct:
  name: mistralai/Mistral-7B-Instruct-v0.2
  dtype: bfloat16
  attn_implementation: eager
  load_in_4bit: false
  device_map: null
  trust_remote_code: false

# Judge — also a chat model, but run in 4-bit by default to save VRAM
judge_llama3_8b:
  name: meta-llama/Meta-Llama-3-8B-Instruct
  dtype: bfloat16
  load_in_4bit: true
  device_map: auto
  trust_remote_code: false

# ~30B-scale judge. Qwen2.5-32B-Instruct in NF4 fits a single 32 GB GPU
# (~17 GB weights + activations) and matches the scale of Granite-4.1-30B used
# by the collaborator's setup. Apache-2.0 licensed.
judge_qwen2_5_32b:
  name: Qwen/Qwen2.5-32B-Instruct
  dtype: bfloat16
  load_in_4bit: true
  device_map: auto
  trust_remote_code: false
